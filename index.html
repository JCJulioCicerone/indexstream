<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 500px;
  height: 300px;
  background: #00e600;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* ALERTA */
.alert {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  opacity: 0;
}

/* MONEDA */
.coin {
  width: 130px;
  height: 130px;
  position: relative;
  transform-style: preserve-3d;
  animation: flip 2s linear infinite;
}

/* CARAS */
.face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
}

.front { transform: rotateY(0deg); }
.back  { transform: rotateY(180deg); }

.face img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.back img {
  transform: scaleX(-1);
}

/* TEXTO */
.text {
  color: white;
  font-size: 28px;
  font-weight: bold;
  text-shadow: 0 0 10px black;
}

/* ANIMACIONES */
.show {
  animation: showAlert 0.4s forwards;
}

.hide {
  animation: hideAlert 0.4s forwards;
}

@keyframes showAlert {
  from { opacity: 0; transform: scale(0.7); }
  to   { opacity: 1; transform: scale(1); }
}

@keyframes hideAlert {
  to { opacity: 0; transform: scale(0.7); }
}

@keyframes flip {
  from { transform: rotateY(0deg); }
  to   { transform: rotateY(360deg); }
}
</style>
</head>

<body>

<div class="alert" id="alert">
  
  <div class="coin">
    <div class="face front">
      <img src="logo.png">
    </div>
    <div class="face back">
      <img src="logo.png">
    </div>
  </div>

  <div class="text" id="text">Nuevo Follow!</div>

</div>

<script>
function triggerAlert(message = "Nuevo Follow!") {
  const alertBox = document.getElementById("alert");
  const text = document.getElementById("text");

  text.innerText = message;

  alertBox.classList.remove("hide");
  alertBox.classList.add("show");

  setTimeout(() => {
    alertBox.classList.remove("show");
    alertBox.classList.add("hide");
  }, 4000);
}
</script>

</body>
</html>

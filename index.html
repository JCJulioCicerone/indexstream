<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alerta Moneda</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #00ff00; /* CHROMA */
  }

  #alerta {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
    text-align: center;
  }

  #moneda {
    width: 180px;
    animation: spin 3s linear infinite;
    filter: drop-shadow(0 0 15px gold);
  }

  #texto {
    font-size: 36px;
    font-weight: bold;
    color: white;
    text-shadow: 3px 3px 10px black;
    margin-top: 15px;
    font-family: Arial, sans-serif;
  }

  @keyframes aparecer {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    60% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  @keyframes desaparecer {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  @keyframes spin {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
</style>
</head>

<body>

<div id="alerta">
  <img id="moneda" src="https://jcjuliocicerone.github.io/indexstream/moneda.png">
  <div id="texto"></div>
</div>

<script src="https://cdn.streamelements.com/widgets.js"></script>

<script>
const alerta = document.getElementById("alerta");
const texto = document.getElementById("texto");

function mostrarAlerta(mensaje) {
  texto.innerText = mensaje;

  alerta.style.animation = "aparecer 0.5s forwards";

  setTimeout(() => {
    alerta.style.animation = "desaparecer 0.5s forwards";
  }, 4000);
}

// EVENTOS
window.addEventListener('onEventReceived', function (obj) {
  const data = obj.detail;

  switch (data.listener) {
    case 'follower-latest':
      mostrarAlerta("Nuevo follow: " + data.event.name);
      break;

    case 'subscriber-latest':
      mostrarAlerta("Nuevo sub: " + data.event.name);
      break;

    case 'cheer-latest':
      mostrarAlerta(data.event.name + " envio " + data.event.amount + " bits");
      break;

    case 'raid-latest':
      mostrarAlerta("Raid de " + data.event.name + " con " + data.event.amount);
      break;

    case 'host-latest':
      mostrarAlerta("Host de " + data.event.name);
      break;
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alerta Moneda</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #00ff00; /* CHROMA KEY */
  }

  #alerta {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    text-align: center;
  }

  #alerta img {
    width: 150px;
    display: block;
    margin: 0 auto;
    animation: girar 1s linear infinite;
  }

  #texto {
    font-size: 30px;
    color: white;
    text-shadow: 2px 2px 5px black;
    margin-top: 10px;
  }

  @keyframes aparecer {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  @keyframes desaparecer {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  @keyframes girar {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>

<body>

<div id="alerta">
  <img src="https://jcjuliocicerone.github.io/indexstream/moneda.png">
  <div id="texto"></div>
</div>

<script src="https://cdn.streamelements.com/widgets.js"></script>

<script>
const alerta = document.getElementById("alerta");
const texto = document.getElementById("texto");

function mostrarAlerta(mensaje) {
  texto.innerText = mensaje;

  alerta.style.animation = "aparecer 0.5s forwards";

  setTimeout(() => {
    alerta.style.animation = "desaparecer 0.5s forwards";
  }, 4000);
}

// EVENTOS STREAM ELEMENTS
window.addEventListener('onEventReceived', function (obj) {
  const data = obj.detail;

  if (data.listener === 'follower-latest') {
    mostrarAlerta("Nuevo follow: " + data.event.name);
  }

  if (data.listener === 'subscriber-latest') {
    mostrarAlerta("Nuevo sub: " + data.event.name);
  }

  if (data.listener === 'raid-latest') {
    mostrarAlerta("Raid de " + data.event.name + " con " + data.event.amount);
  }

  if (data.listener === 'host-latest') {
    mostrarAlerta("Host de " + data.event.name);
  }

  if (data.listener === 'cheer-latest') {
    mostrarAlerta(data.event.name + " donó " + data.event.amount + " bits");
  }
});
</script>

</body>
</html>
